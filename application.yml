server:
  port: ${PORT}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

  server:
    password: "youshallnotpass"

    bufferDurationMs: 1000
    frameBufferDurationMs: 10000
    opusEncodingQuality: 5
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000

    sources:
      youtube: false
      soundcloud: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

  lavasrc:
    providers:
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"

    sources:
      spotify: true

    spotify:
      clientId: "YOUR_NEW_SPOTIFY_CLIENT_ID"
      clientSecret: "YOUR_NEW_SPOTIFY_CLIENT_SECRET"
      countryCode: "GB"

logging:
  level:
    root: INFO
