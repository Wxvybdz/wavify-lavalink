server:
  port: ${PORT}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

  server:
    password: "youshallnotpass"

    bufferDurationMs: 1000
    frameBufferDurationMs: 10000
    opusEncodingQuality: 5
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000

    sources:
      youtube: false
      soundcloud: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

  lavasrc:
    providers:
      - "ytsearch:%ISRC%"
      - "ytsearch:%QUERY%"
      - "scsearch:%ISRC%"
      - "scsearch:%QUERY%"

    sources:
      spotify: true

    spotify:
      clientId: "00565b4a154441b9999482ef0fa7537c"
      clientSecret: "cadb9ab0ac5f4e619d7a303bdb99791c"
      countryCode: "GB"

logging:
  level:
    root: INFO
